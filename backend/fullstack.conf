
# Default server configuration
#
server {
	listen 80   ;
	listen [::]:80 ;

	 

	root /var/www/fullstack/;

	# Add index.php to the list if you are using PHP
	index index.html index.htm index.nginx-debian.html;

	server_name fullstack.ai;

	location / {
        proxy_pass http://localhost:8118;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
 
}
server {
    
    listen       443 ssl;
   
    server_name  fullstack.ai;

    root /var/www/fullstack/;
    
    ssl_certificate   /etc/letsencrypt/live/fullstack.ai/fullchain.pem ;  
    ssl_certificate_key  /etc/letsencrypt/live/fullstack.ai/privkey.pem;  
   
    ssl_session_timeout  5m;     
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;    
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;     
    

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}




 
